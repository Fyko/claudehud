name: Release

on:
  push:
    tags:
      - 'v*'

permissions: read-all

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      attestations: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.95"
          targets: ${{ matrix.target }}

      - name: Install MUSL Tools
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools

      - name: Cache Cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build
        shell: bash
        run: |
          cargo build --release --locked --target ${{ matrix.target }} \
            -p claudehud -p claudehud-daemon

      - name: Stage Artifacts
        shell: bash
        run: |
          mkdir dist
          ext=""
          if [[ "${{ matrix.target }}" == *windows* ]]; then ext=".exe"; fi
          cp target/${{ matrix.target }}/release/claudehud${ext} \
            dist/claudehud-${{ matrix.target }}${ext}
          cp target/${{ matrix.target }}/release/claudehud-daemon${ext} \
            dist/claudehud-daemon-${{ matrix.target }}${ext}

      - name: Emit Checksums (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd dist
          for f in *; do
            if command -v shasum >/dev/null 2>&1; then
              shasum -a 256 "$f" > "$f.sha256"
            else
              sha256sum "$f" > "$f.sha256"
            fi
          done

      - name: Emit Checksums (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-ChildItem dist -File | Where-Object { $_.Name -notlike '*.sha256' } |
            ForEach-Object {
              $h = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
              "$h  $($_.Name)" | Out-File "$($_.FullName).sha256" -Encoding ascii -NoNewline
            }

      - name: Attest claudehud
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: dist/claudehud-${{ matrix.target }}${{ contains(matrix.target, 'windows') && '.exe' || '' }}

      - name: Attest claudehud-daemon
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: dist/claudehud-daemon-${{ matrix.target }}${{ contains(matrix.target, 'windows') && '.exe' || '' }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: binaries-${{ matrix.target }}
          path: dist/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: dist/*
          generate_release_notes: true
